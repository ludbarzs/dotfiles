# --- Font Configuration ---
font_family      Liga SFMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12

# --- Transparency Settings ---
background_opacity         0.9

# --- Alacritty/Kitty "Vi-Mode" ---
map ctrl+shift+space show_scrollback
scrollback_pager nvim --cmd 'set eventignore=FileType' +'nnoremap q ZQ' +'call nvim_open_term(0, {})' +'set nomodified nolist' +'$' -

# Get colors from wallust
include ~/.cache/wallust/kitty-colors.conf
# include ~/.cache/matugen/kitty-colors.conf

allow_remote_control yes

cursor_trail 1
cursor_trail_decay 0.15 0.3
cursor_trail_start_threshold 1

# ==========================================================================
# Kitty Tab Keybindings Cheat Sheet & Configuration
# ==========================================================================

map ctrl+shift+h        previous_tab
map ctrl+shift+l        next_tab

map ctrl+shift+t        new_tab
map ctrl+shift+q        close_tab

map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab
map ctrl+shift+.        move_tab_forward
map ctrl+shift+,        move_tab_backward
map ctrl+shift+alt+t    set_tab_title
